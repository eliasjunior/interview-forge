<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JVM Metrics (D3)</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg: #f4efe6;
      --ink: #222222;
      --muted: #5e5e5e;
      --accent: #0e7490;
      --accent2: #b45309;
      --card: #fffdf8;
      --line: #ded7ca;
    }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(1200px 500px at 100% -10%, #f8d9b4 0%, var(--bg) 55%);
    }
    .wrap {
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .title {
      margin: 0 0 6px;
      font-size: 30px;
      letter-spacing: 0.2px;
    }
    .sub {
      color: var(--muted);
      margin-bottom: 16px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .k {
      font-size: 12px;
      color: var(--muted);
    }
    .v {
      font-size: 21px;
      font-weight: 700;
      margin-top: 4px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 8px;
    }
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .list {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 180px;
    }
    .list h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }
    .list pre {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      color: #303030;
      max-height: 240px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #status {
      margin: 8px 0 0;
      font-size: 13px;
      color: var(--muted);
    }
    @media (max-width: 640px) {
      .title { font-size: 24px; }
      .v { font-size: 18px; }
      .split { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">JVM Live Metrics</h1>
    <div class="sub">Polls <code>http://localhost:8080/metrics</code> every second</div>

    <div class="cards">
      <div class="card"><div class="k">Heap Used</div><div id="heapUsedNow" class="v">-</div></div>
      <div class="card"><div class="k">Heap Max</div><div id="heapMaxNow" class="v">-</div></div>
      <div class="card"><div class="k">Live Threads</div><div id="liveThreadsNow" class="v">-</div></div>
      <div class="card"><div class="k">Daemon Threads</div><div id="daemonThreadsNow" class="v">-</div></div>
      <div class="card"><div class="k">Total Started Threads</div><div id="totalThreadsNow" class="v">-</div></div>
      <div class="card"><div class="k">Submitted Tasks</div><div id="submittedTasksNow" class="v">-</div></div>
      <div class="card"><div class="k">App Threads</div><div id="appThreadsNow" class="v">-</div></div>
      <div class="card"><div class="k">JVM Threads</div><div id="jvmThreadsNow" class="v">-</div></div>
    </div>

    <div class="panel">
      <svg id="chart" width="960" height="380" viewBox="0 0 960 380" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="split">
      <div class="list">
        <h3>App Thread Names</h3>
        <pre id="appThreadNames">-</pre>
      </div>
      <div class="list">
        <h3>JVM Thread Names</h3>
        <pre id="jvmThreadNames">-</pre>
      </div>
    </div>
    <div id="status">Waiting for first sample...</div>
  </div>

  <script>
    const maxPoints = 120;
    const data = [];
    const svg = d3.select("#chart");
    const width = 960;
    const height = 380;
    const margin = { top: 18, right: 24, bottom: 30, left: 55 };
    const innerW = width - margin.left - margin.right;
    const innerH = height - margin.top - margin.bottom;

    const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);
    const x = d3.scaleLinear().range([0, innerW]);
    const yHeap = d3.scaleLinear().range([innerH, 0]);
    const yThread = d3.scaleLinear().range([innerH, 0]);

    const xAxisG = g.append("g").attr("transform", `translate(0,${innerH})`);
    const yAxisHeapG = g.append("g");
    const yAxisThreadG = g.append("g").attr("transform", `translate(${innerW},0)`);

    g.append("text")
      .attr("x", 0).attr("y", -4)
      .attr("fill", "#0e7490")
      .attr("font-size", 12)
      .text("Heap Used (MB)");

    g.append("text")
      .attr("x", innerW).attr("y", -4)
      .attr("text-anchor", "end")
      .attr("fill", "#b45309")
      .attr("font-size", 12)
      .text("Thread Counts");

    const legend = g.append("g").attr("transform", "translate(10,10)");
    function addLegendRow(y, color, dash, label) {
      const row = legend.append("g").attr("transform", `translate(0,${y})`);
      row.append("line")
        .attr("x1", 0).attr("x2", 24).attr("y1", 0).attr("y2", 0)
        .attr("stroke", color).attr("stroke-width", 2.5)
        .attr("stroke-dasharray", dash || null);
      row.append("text")
        .attr("x", 30).attr("y", 4)
        .attr("font-size", 12)
        .attr("fill", "#2a2a2a")
        .text(label);
    }
    addLegendRow(0, "#0e7490", null, "Heap Used (MB)");
    addLegendRow(18, "#b45309", "7 5", "App Threads");
    addLegendRow(36, "#7c3aed", null, "JVM Threads");

    const heapLine = d3.line()
      .x((d, i) => x(i))
      .y(d => yHeap(d.heapUsed / (1024 * 1024)));

    const appThreadLine = d3.line()
      .x((d, i) => x(i))
      .y(d => yThread(d.appThreadCount ?? 0));

    const jvmThreadLine = d3.line()
      .x((d, i) => x(i))
      .y(d => yThread(d.jvmThreadCount ?? 0));

    const heapPath = g.append("path")
      .attr("fill", "none")
      .attr("stroke", "#0e7490")
      .attr("stroke-width", 2.5);

    const appThreadPath = g.append("path")
      .attr("fill", "none")
      .attr("stroke", "#b45309")
      .attr("stroke-width", 2.5)
      .attr("stroke-dasharray", "7 5");

    const jvmThreadPath = g.append("path")
      .attr("fill", "none")
      .attr("stroke", "#7c3aed")
      .attr("stroke-width", 2.5);

    const fmtMB = n => `${(n / (1024 * 1024)).toFixed(1)} MB`;
    const fmtInt = n => new Intl.NumberFormat().format(n);
    const status = document.getElementById("status");

    async function pull() {
      try {
        const s = await fetch("http://localhost:8080/metrics", { cache: "no-store" });
        if (!s.ok) throw new Error(`HTTP ${s.status}`);
        const sample = await s.json();
        data.push(sample);
        if (data.length > maxPoints) data.shift();
        paint(sample);
        status.textContent = `Last sample: ${new Date(sample.timestamp).toLocaleTimeString()}`;
      } catch (e) {
        status.textContent = `Fetch error: ${e.message}. Start Lab.java first.`;
      }
    }

    function paint(now) {
      const heapValues = data.map(d => d.heapUsed / (1024 * 1024));
      const appValues = data.map(d => d.appThreadCount ?? 0);
      const jvmValues = data.map(d => d.jvmThreadCount ?? 0);
      const threadValues = appValues.concat(jvmValues);

      x.domain([0, Math.max(1, data.length - 1)]);
      yHeap.domain([0, Math.max(16, d3.max(heapValues) * 1.2)]);
      yThread.domain([0, Math.max(4, d3.max(threadValues) * 1.2)]);

      xAxisG.call(d3.axisBottom(x).ticks(8).tickFormat(i => `-${Math.max(0, data.length - 1 - i)}s`));
      yAxisHeapG.call(d3.axisLeft(yHeap).ticks(6).tickFormat(v => `${v.toFixed(0)} MB`));
      yAxisThreadG.call(d3.axisRight(yThread).ticks(6).tickFormat(v => `${v.toFixed(0)}`));

      heapPath.datum(data).attr("d", heapLine);
      appThreadPath.datum(data).attr("d", appThreadLine);
      jvmThreadPath.datum(data).attr("d", jvmThreadLine);

      document.getElementById("heapUsedNow").textContent = fmtMB(now.heapUsed);
      document.getElementById("heapMaxNow").textContent = fmtMB(now.heapMax);
      document.getElementById("liveThreadsNow").textContent = fmtInt(now.liveThreads);
      document.getElementById("daemonThreadsNow").textContent = fmtInt(now.daemonThreads);
      document.getElementById("totalThreadsNow").textContent = fmtInt(now.totalStartedThreads);
      document.getElementById("submittedTasksNow").textContent = fmtInt(now.submittedTasks);
      document.getElementById("appThreadsNow").textContent = fmtInt(now.appThreadCount ?? 0);
      document.getElementById("jvmThreadsNow").textContent = fmtInt(now.jvmThreadCount ?? 0);
      document.getElementById("appThreadNames").textContent = (now.appThreadNames ?? []).join("\n") || "-";
      document.getElementById("jvmThreadNames").textContent = (now.jvmThreadNames ?? []).join("\n") || "-";
    }

    pull();
    setInterval(pull, 1000);
  </script>
</body>
</html>
